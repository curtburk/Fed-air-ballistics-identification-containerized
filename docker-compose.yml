services:
  vllm:
    image: vllm/vllm-openai:v0.20.0-cu130-ubuntu2404
    container_name: china-lake-vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${HF_CACHE:-/home/curtburk/.cache/huggingface}:/root/.cache/huggingface
    ports:
      - "8091:8000"
    ipc: host
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    entrypoint: >
      bash -c "exec vllm serve
      --model Qwen/Qwen3.6-35B-A3B
      --max-model-len 32768
      --gpu-memory-utilization 0.85
      --enable-prefix-caching"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: china-lake-app
    ports:
      - "8092:8000"
    volumes:
      - ./output:/app/output
      - ./uploads:/app/uploads
    environment:
      - VLLM_URL=${VLLM_URL:-http://172.17.0.1:8091}
      - VLLM_MODEL=Qwen/Qwen3.6-35B-A3B
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

# Verified working on ZGX Nano, driver 580.95.05
# vllm/vllm-openai:v0.20.0-cu130-ubuntu2404
# DO NOT add --kv-cache-dtype fp8_e4m3 (incompatible with flash_attn in this build)
# DFlash speculative decoding not compatible with Qwen3.5 Mamba hybrid on this build
# App listens on port 8000 internally, mapped to 8092 externally